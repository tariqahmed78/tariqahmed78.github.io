<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Router Manager | Professional Network Controls</title>

    <style>
        :root {
            --primary: #00D4FF;
            --primary-dim: #00a8cc;
            --dark: #060B14;
            --panel: #0F1A2B;
            --gray: #7C8CA6;
            --light: #F1F6FC;
            --line: rgba(0, 212, 255, 0.14);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Space Grotesk', sans-serif;
            margin: 0;
            background: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* ---- Ambient network grid ---- */
        .grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--line) 1px, transparent 1px),
                linear-gradient(90deg, var(--line) 1px, transparent 1px);
            background-size: 56px 56px;
            mask-image: radial-gradient(ellipse 70% 60% at 50% 40%, black 20%, transparent 75%);
            animation: driftGrid 40s linear infinite;
        }
        @keyframes driftGrid {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 56px 112px, 56px 112px; }
        }

        /* ---- Signal pulses (the signature element) ---- */
        .signal {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 12px 2px var(--primary);
        }
        .ring {
            position: absolute;
            top: -78px;
            left: 50%;
            width: 6px;
            height: 6px;
            border: 1px solid var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: pulse 3.6s cubic-bezier(0.2, 0.6, 0.4, 1) infinite;
        }
        .ring:nth-child(2) { animation-delay: 1.2s; }
        .ring:nth-child(3) { animation-delay: 2.4s; }
        @keyframes pulse {
            0%   { width: 6px; height: 6px; opacity: 0.9; }
            80%  { width: 480px; height: 480px; opacity: 0; }
            100% { width: 480px; height: 480px; opacity: 0; }
        }

        .container {
            max-width: 620px;
            padding: 2rem;
            position: relative;
            z-index: 2;
        }

        .badge {
            background: rgba(0, 212, 255, 0.08);
            border: 1px solid rgba(0, 212, 255, 0.35);
            color: var(--primary);
            padding: 0.45rem 1.1rem;
            border-radius: 99px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.12em;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.75rem;
            animation: fadeUp 0.8s ease both;
        }
        .badge .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--primary);
            box-shadow: 0 0 8px 2px var(--primary);
            animation: blink 1.8s ease-in-out infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 3.4rem);
            margin: 0 0 1.1rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(180deg, #FFFFFF 0%, #B9D6E8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: fadeUp 0.8s ease 0.1s both;
        }

        p {
            font-size: 1.1rem;
            color: var(--gray);
            line-height: 1.65;
            margin: 0 0 2.25rem;
            animation: fadeUp 0.8s ease 0.2s both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .btn {
            background: var(--primary);
            color: #041018;
            padding: 1rem 2.1rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            position: relative;
            isolation: isolate;
            animation: fadeUp 0.8s ease 0.3s both;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.5);
        }
        .btn::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), transparent 60%);
            z-index: -1;
            opacity: 0;
            filter: blur(10px);
            transition: opacity 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px -6px rgba(0, 212, 255, 0.55);
        }
        .btn:hover::before {
            opacity: 0.9;
        }
        .btn svg { width: 18px; height: 18px; }

        .links {
            margin-top: 3rem;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 1.25rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            animation: fadeUp 0.8s ease 0.4s both;
        }
        .links a {
            color: var(--gray);
            text-decoration: none;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: 0.02em;
            transition: color 0.2s ease;
        }
        .links a:hover {
            color: var(--primary);
        }

        @media (prefers-reduced-motion: reduce) {
            .grid, .ring, .badge .dot, .badge, h1, p, .btn, .links {
                animation: none !important;
            }
        }
    </style>
</head>

    <div class="ring"></div>
    <div class="ring"></div>
    <div class="ring"></div>
