<header class="page-head">
  <h1>Get in touch.</h1>
  <p>Questions, feedback, or app support — send a message or email directly.</p>
</header>

<section class="contact-wrap">

  <!--
    This form posts to Formspree, a free service that emails submissions
    to your inbox (GitHub Pages has no backend of its own).
    1. Go to formspree.io and sign up free
    2. Create a form — it gives you an endpoint like https://formspree.io/f/xxxxxxx
    3. Replace the action="" URL below with that endpoint
  -->
  <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required>
    </div>
    <div class="form-group">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" name="message" required></textarea>
    </div>
    <button type="submit" class="btn-primary">Send message</button>
  </form>

  <div class="contact-links">
    <div class="contact-row">✉️ <a href="mailto:tariqahmed7@proton.mail">tariqahmed7@proton.mail</a></div>
    <div class="contact-row">▶ <a href="https://youtube.com/@madebytart" target="_blank" rel="noopener">YouTube — Madebyt Art</a></div>
  </div>
</section>
